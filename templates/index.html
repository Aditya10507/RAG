<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231f2328'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-size='22' font-family='Arial' font-weight='700' fill='white'%3EAI%3C/text%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --page: #f6f5f1;
      --panel: #ffffff;
      --panel-soft: #fbfaf7;
      --text: #1f2328;
      --text-soft: #5b616b;
      --text-muted: #858b94;
      --line: #dedbd2;
      --line-strong: #cbc6ba;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --accent-soft: #e3f4f1;
      --warn: #b45309;
      --danger: #b42318;
      --success: #15803d;
      --shadow: 0 18px 45px rgba(31, 35, 40, 0.08);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    button, textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      height: 100vh;
      min-height: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #ebe7dd;
      border-right: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(31, 35, 40, 0.08);
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #1f2328;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand-title {
      font-weight: 700;
      line-height: 1.1;
    }

    .brand-status {
      margin-top: 3px;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.3;
    }

    .sidebar-actions {
      display: grid;
      gap: 8px;
      padding: 14px;
    }

    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 9px;
      width: 100%;
      min-height: 40px;
      padding: 9px 11px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .action-button:hover {
      background: var(--panel-soft);
      border-color: #aaa394;
    }

    .action-button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .action-button.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .action-button:disabled,
    .icon-button:disabled,
    .send-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(31, 35, 40, 0.08);
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .documents {
      display: grid;
      gap: 7px;
      min-height: 0;
      overflow-y: auto;
      padding-top: 8px;
    }

    .document-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      padding: 9px;
      border: 1px solid rgba(31, 35, 40, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.52);
    }

    .document-icon {
      display: grid;
      place-items: center;
      width: 28px;
      height: 32px;
      border-radius: 6px;
      background: #fff7ed;
      color: var(--warn);
    }

    .document-name {
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .document-size {
      color: var(--text-muted);
      font-size: 12px;
    }

    .empty-documents {
      padding: 12px 4px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .system-panel {
      margin-top: auto;
      padding: 14px;
      border-top: 1px solid rgba(31, 35, 40, 0.08);
    }

    .status-grid {
      display: grid;
      gap: 7px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 9px;
      border: 1px solid rgba(31, 35, 40, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.48);
      color: var(--text-soft);
      font-size: 12px;
    }

    .status-value {
      color: var(--text);
      font-weight: 700;
    }

    .chat-area {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
      background: var(--panel);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 66px;
      padding: 13px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
    }

    .conversation-title {
      min-width: 0;
    }

    .conversation-title h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
    }

    .conversation-title p {
      margin: 3px 0 0;
      color: var(--text-soft);
      font-size: 13px;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text-soft);
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .icon-button:hover {
      background: var(--panel-soft);
      border-color: var(--line-strong);
      color: var(--text);
    }

    .chat-container {
      min-height: 0;
      overflow-y: auto;
      scroll-behavior: smooth;
      background:
        linear-gradient(to bottom, rgba(246, 245, 241, 0.54), rgba(255, 255, 255, 0) 180px),
        var(--panel);
    }

    .chat-container::-webkit-scrollbar,
    .documents::-webkit-scrollbar {
      width: 8px;
    }

    .chat-container::-webkit-scrollbar-thumb,
    .documents::-webkit-scrollbar-thumb {
      background: #d2cdc2;
      border-radius: 999px;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 34px 24px 32px;
    }

    .welcome {
      display: grid;
      align-content: center;
      min-height: 54vh;
    }

    .welcome-inner {
      max-width: 680px;
    }

    .welcome h2 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 52px);
      font-weight: 750;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .welcome p {
      margin: 0;
      max-width: 580px;
      color: var(--text-soft);
      font-size: 16px;
      line-height: 1.55;
    }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 24px;
    }

    .suggestion-chip {
      min-height: 52px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--text);
      cursor: pointer;
      line-height: 1.35;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .suggestion-chip:hover {
      background: #f1eee7;
      border-color: var(--line-strong);
    }

    .message {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 12px;
      animation: slideUp 220ms ease;
    }

    .message.user {
      grid-template-columns: minmax(0, 1fr) 34px;
    }

    .message-avatar {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #ede9df;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .message.assistant .message-avatar {
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .message.user .message-avatar {
      grid-column: 2;
      background: #1f2328;
      color: #fff;
    }

    .message.user .message-content {
      grid-column: 1;
      grid-row: 1;
      justify-self: end;
      max-width: min(680px, 100%);
    }

    .message-content {
      min-width: 0;
    }

    .message-role {
      margin-bottom: 5px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .message.user .message-role {
      text-align: right;
    }

    .message-text {
      color: var(--text);
      font-size: 15px;
      line-height: 1.65;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .message.user .message-text {
      padding: 11px 13px;
      border-radius: var(--radius);
      background: #f1eee7;
      line-height: 1.5;
    }

    .message-text code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #f0f1f2;
      color: #24292f;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    .message-text pre {
      margin: 12px 0;
      padding: 14px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f6f8fa;
    }

    .message-text pre code {
      padding: 0;
      background: transparent;
    }

    .message-text ul,
    .message-text ol {
      margin: 8px 0;
      padding-left: 22px;
    }

    .message-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .message:hover .message-actions {
      opacity: 1;
    }

    .message.user .message-actions {
      justify-content: flex-end;
    }

    .msg-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
    }

    .msg-btn:hover {
      background: var(--panel-soft);
      color: var(--text);
    }

    .typing-indicator {
      display: inline-flex;
      gap: 5px;
      padding-top: 6px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--text-muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.14s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.28s; }

    .composer-wrap {
      padding: 14px 22px 20px;
      border-top: 1px solid var(--line);
      background: linear-gradient(to top, #ffffff 80%, rgba(255, 255, 255, 0.78));
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    #message-input {
      flex: 1;
      min-height: 38px;
      max-height: 150px;
      padding: 8px 4px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.45;
    }

    #message-input::placeholder {
      color: var(--text-muted);
    }

    .send-button {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      flex: 0 0 auto;
      transition: background 160ms ease;
    }

    .send-button:hover {
      background: var(--accent-dark);
    }

    .file-input-hidden {
      display: none;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 20;
      max-width: min(460px, calc(100vw - 44px));
      padding: 11px 13px;
      border: 1px solid rgba(31, 35, 40, 0.12);
      border-radius: var(--radius);
      background: #1f2328;
      color: white;
      box-shadow: var(--shadow);
      font-size: 14px;
      line-height: 1.4;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.45; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        padding: 11px 12px;
      }

      .conversation-title p {
        display: none;
      }

      .chat-messages {
        padding: 24px 14px 26px;
      }

      .suggestions {
        grid-template-columns: 1fr;
      }

      .composer-wrap {
        padding: 10px 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div>
          <div class="brand-title">RAG Assistant</div>
          <div class="brand-status" id="document-status">Checking documents...</div>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="action-button primary" id="upload-btn" title="Upload PDF documents">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          Upload PDFs
        </button>
        <button class="action-button" id="reindex-btn" title="Rebuild search index">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.2"/><path d="M18 2v4h-4"/><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M6 22v-4h4"/></svg>
          Rebuild index
        </button>
      </div>

      <div class="sidebar-section">
        <div class="section-heading">
          <span>Documents</span>
          <span id="document-count">0</span>
        </div>
        <div class="documents" id="document-list">
          <div class="empty-documents">No PDFs uploaded.</div>
        </div>
      </div>

      <div class="system-panel">
        <div class="section-heading">System</div>
        <div class="status-grid">
          <div class="status-pill"><span>Index</span><span class="status-value" id="index-status">Checking</span></div>
          <div class="status-pill"><span>Groq</span><span class="status-value" id="groq-status">Checking</span></div>
        </div>
      </div>
    </aside>

    <main class="chat-area">
      <header class="topbar">
        <div class="conversation-title">
          <h1>AI Assistant</h1>
          <p id="top-status">Chat normally, or upload PDFs for document-grounded answers.</p>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="mobile-upload-btn" title="Upload PDF documents">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          </button>
          <button class="icon-button" id="mobile-reindex-btn" title="Rebuild search index">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.2"/><path d="M18 2v4h-4"/><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M6 22v-4h4"/></svg>
          </button>
          <button class="icon-button" id="clear-btn" title="New chat">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          </button>
          <button class="icon-button" id="health-btn" title="Check system status">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </button>
        </div>
      </header>

      <input class="file-input-hidden" id="document-upload" type="file" accept="application/pdf,.pdf" multiple>

      <section class="chat-container" id="chat-container">
        <div class="chat-messages" id="chat-messages">
          <div class="welcome" id="welcome">
            <div class="welcome-inner">
              <h2>How can I help?</h2>
              <p>Ask anything now. Upload PDFs and rebuild the index when you want answers grounded in your documents.</p>
              <div class="suggestions">
                <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain RAG in simple terms</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">Help me plan a document review</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">Draft a concise email</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">What can you help me with?</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <footer class="composer-wrap">
        <div class="composer">
          <textarea id="message-input" rows="1" placeholder="Message AI Assistant..."></textarea>
          <button class="send-button" id="send-btn" title="Send message" disabled>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg>
          </button>
        </div>
      </footer>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const chatMessages = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const mobileUploadBtn = document.getElementById('mobile-upload-btn');
    const reindexBtn = document.getElementById('reindex-btn');
    const mobileReindexBtn = document.getElementById('mobile-reindex-btn');
    const documentUpload = document.getElementById('document-upload');
    const clearBtn = document.getElementById('clear-btn');
    const healthBtn = document.getElementById('health-btn');
    const toast = document.getElementById('toast');
    const documentStatus = document.getElementById('document-status');
    const documentCount = document.getElementById('document-count');
    const documentList = document.getElementById('document-list');
    const indexStatus = document.getElementById('index-status');
    const groqStatus = document.getElementById('groq-status');
    const topStatus = document.getElementById('top-status');

    let isLoading = false;
    let messageHistory = [];

    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
      sendBtn.disabled = !messageInput.value.trim();
    });

    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        if (!sendBtn.disabled && !isLoading) sendMessage();
      }
    });

    sendBtn.addEventListener('click', () => {
      if (!isLoading) sendMessage();
    });

    clearBtn.addEventListener('click', clearChat);
    healthBtn.addEventListener('click', checkHealth);
    uploadBtn.addEventListener('click', () => documentUpload.click());
    mobileUploadBtn.addEventListener('click', () => documentUpload.click());
    reindexBtn.addEventListener('click', rebuildIndex);
    mobileReindexBtn.addEventListener('click', rebuildIndex);
    documentUpload.addEventListener('change', uploadDocuments);

    function setBusy(isBusy) {
      uploadBtn.disabled = isBusy;
      mobileUploadBtn.disabled = isBusy;
      reindexBtn.disabled = isBusy;
      mobileReindexBtn.disabled = isBusy;
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      const exponent = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
      const value = bytes / Math.pow(1024, exponent);
      return `${value.toFixed(value >= 10 || exponent === 0 ? 0 : 1)} ${units[exponent]}`;
    }

    function sendSuggestion(button) {
      messageInput.value = button.textContent;
      messageInput.dispatchEvent(new Event('input'));
      sendMessage();
    }

    function showToast(message, type = 'error') {
      toast.textContent = message;
      toast.style.background = type === 'success' ? '#14532d' : '#1f2328';
      if (type === 'error') toast.style.background = '#7f1d1d';
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 5200);
    }

    const showError = showToast;

    function renderMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      html = html
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/\n/g, '<br>');

      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function createMessageElement(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const avatarLabel = role === 'user' ? 'Y' : 'AI';
      const roleName = role === 'user' ? 'You' : 'Assistant';
      const body = role === 'user' ? escapeHtml(text) : renderMarkdown(text);

      div.innerHTML = `
        <div class="message-avatar">${avatarLabel}</div>
        <div class="message-content">
          <div class="message-role">${roleName}</div>
          <div class="message-text">${body}</div>
          <div class="message-actions">
            <button class="msg-btn" onclick="copyMessage(this)" title="Copy message">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
          </div>
        </div>
      `;
      return div;
    }

    function copyMessage(button) {
      const text = button.closest('.message-content').querySelector('.message-text').textContent;
      navigator.clipboard.writeText(text);
      button.textContent = 'Copied';
      setTimeout(() => {
        button.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy';
      }, 1400);
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing-msg';
      div.innerHTML = `
        <div class="message-avatar">AI</div>
        <div class="message-content">
          <div class="message-role">Assistant</div>
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      `;
      chatMessages.appendChild(div);
      scrollToBottom();
    }

    function hideTyping() {
      const element = document.getElementById('typing-msg');
      if (element) element.remove();
    }

    function scrollToBottom() {
      chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    async function uploadDocuments() {
      const files = Array.from(documentUpload.files || []);
      if (!files.length) return;

      const formData = new FormData();
      files.forEach((file) => formData.append('documents', file));

      setBusy(true);
      showToast('Uploading PDF documents...', 'success');

      try {
        const response = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await response.json();

        if (!response.ok) {
          showToast(data.error || 'Upload failed.');
          return;
        }

        const uploadedCount = data.uploaded ? data.uploaded.length : files.length;
        const rejectedCount = data.rejected ? data.rejected.length : 0;
        const suffix = rejectedCount ? ` ${rejectedCount} file(s) were skipped.` : '';
        showToast(`${uploadedCount} PDF file(s) uploaded. Rebuild the index before chatting with them.${suffix}`, 'success');
        await refreshSystemState();
      } catch (error) {
        showToast('Upload failed. Is the server running?');
      } finally {
        setBusy(false);
        documentUpload.value = '';
      }
    }

    async function refreshDocuments() {
      const response = await fetch('/api/documents');
      const data = await response.json();
      const documents = data.documents || [];

      documentCount.textContent = documents.length;
      documentStatus.textContent = documents.length === 1 ? '1 PDF uploaded' : `${documents.length} PDFs uploaded`;

      if (!documents.length) {
        documentList.innerHTML = '<div class="empty-documents">No PDFs uploaded.</div>';
        return documents;
      }

      documentList.innerHTML = documents.map((document) => `
        <div class="document-row" title="${escapeHtml(document.filename)}">
          <div class="document-icon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
          </div>
          <div>
            <div class="document-name">${escapeHtml(document.filename)}</div>
            <div class="document-size">${formatBytes(document.size)}</div>
          </div>
        </div>
      `).join('');

      return documents;
    }

    async function refreshHealth() {
      const response = await fetch('/api/health');
      const data = await response.json();

      indexStatus.textContent = data.index_ready ? 'Ready' : 'Missing';
      indexStatus.style.color = data.index_ready ? 'var(--success)' : 'var(--warn)';
      groqStatus.textContent = data.groq_configured ? 'Ready' : 'Missing';
      groqStatus.style.color = data.groq_configured ? 'var(--success)' : 'var(--warn)';
      topStatus.textContent = data.index_ready
        ? `${data.uploaded_documents} PDF(s) indexed.`
        : data.uploaded_documents
          ? `${data.uploaded_documents} PDF(s) uploaded. General chat ready; rebuild index for document answers.`
          : 'General chat ready. Upload PDFs for document-grounded answers.';

      return data;
    }

    async function refreshSystemState() {
      try {
        await Promise.all([refreshDocuments(), refreshHealth()]);
      } catch (error) {
        documentStatus.textContent = 'Status unavailable';
        topStatus.textContent = 'Unable to reach the server.';
      }
    }

    async function rebuildIndex() {
      setBusy(true);
      showToast('Rebuilding search index. This can take a minute...', 'success');

      try {
        const response = await fetch('/api/reindex', { method: 'POST' });
        const data = await response.json();

        if (!response.ok) {
          showToast(data.error || 'Index rebuild failed.');
          return;
        }

        showToast(`Index rebuilt from ${data.documents} PDF(s) with ${data.chunks} chunk(s).`, 'success');
        await refreshSystemState();
      } catch (error) {
        showToast('Index rebuild failed. Is the server running?');
      } finally {
        setBusy(false);
      }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isLoading) return;

      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      chatMessages.appendChild(createMessageElement('user', text));
      messageHistory.push({ role: 'user', content: text });

      messageInput.value = '';
      messageInput.style.height = 'auto';
      sendBtn.disabled = true;
      isLoading = true;
      showTyping();
      scrollToBottom();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await response.json();

        hideTyping();

        if (!response.ok) {
          showError(data.error || 'Something went wrong');
          return;
        }

        chatMessages.appendChild(createMessageElement('assistant', data.reply));
        messageHistory.push({ role: 'assistant', content: data.reply });
        scrollToBottom();
      } catch (error) {
        hideTyping();
        showError('Failed to connect to the server.');
      } finally {
        isLoading = false;
        sendBtn.disabled = !messageInput.value.trim();
        messageInput.focus();
      }
    }

    async function clearChat() {
      try {
        await fetch('/api/clear', { method: 'POST' });
      } catch (error) {
        /* keep local clear available */
      }

      messageHistory = [];
      chatMessages.innerHTML = `
        <div class="welcome" id="welcome">
          <div class="welcome-inner">
            <h2>How can I help?</h2>
            <p>Ask anything now. Upload PDFs and rebuild the index when you want answers grounded in your documents.</p>
            <div class="suggestions">
              <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain RAG in simple terms</button>
              <button class="suggestion-chip" onclick="sendSuggestion(this)">Help me plan a document review</button>
              <button class="suggestion-chip" onclick="sendSuggestion(this)">Draft a concise email</button>
              <button class="suggestion-chip" onclick="sendSuggestion(this)">What can you help me with?</button>
            </div>
          </div>
        </div>
      `;
      messageInput.focus();
    }

    async function checkHealth() {
      try {
        const data = await refreshHealth();
        if (data.index_ready && data.groq_configured) {
          showToast(`System healthy. ${data.uploaded_documents} PDF(s) uploaded and Groq is configured.`, 'success');
        } else if (!data.index_ready) {
          showToast(`Index is not ready. Rebuild it after uploading PDFs.`);
        } else {
          showToast('GROQ_API_KEY is missing. Add it to your environment or .env file.');
        }
      } catch (error) {
        showToast('Cannot reach the server.');
      }
    }

    refreshSystemState();
    messageInput.focus();
  </script>
</body>
</html>
